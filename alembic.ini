# Configuração do Alembic. A URL do banco é injetada em runtime por
# migrations/env.py a partir de app.core.config.settings (não fica hardcoded aqui).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# Datas em UTC nos nomes de arquivo de versão.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# EXEMPLO — copie para um Secret real (NÃO versione o real).
# Gere o SECRET_KEY com: openssl rand -hex 32
# As chaves POSTGRES_* aqui também alimentam o container do Postgres (ver postgres.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: stockguardian-secrets
type: Opaque
stringData:
  SECRET_KEY: change-me-please-use-openssl-rand-hex-32
  POSTGRES_USER: stockguardian
  POSTGRES_PASSWORD: change-me-strong-password
  FIRST_SUPERUSER_EMAIL: admin@stockguardian.com
  FIRST_SUPERUSER_PASSWORD: Admin@123

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, type-check & tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stockguardian
          POSTGRES_PASSWORD: stockguardian
          POSTGRES_DB: stockguardian_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stockguardian -d stockguardian_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql+asyncpg://stockguardian:stockguardian@localhost:5432/stockguardian_test
      SECRET_KEY: ci-secret-key-not-for-production

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install dependencies
        run: uv pip install --system ".[dev]"

      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .

      - name: Mypy (type check)
        run: mypy app

      - name: Pytest (unit + integration)
        run: pytest --cov=app --cov-report=term-missing
